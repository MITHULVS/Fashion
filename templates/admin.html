
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LUXE — Admin Panel</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- ─── NAVIGATION BAR ─── -->
  <nav class="navbar">
    <div class="nav-logo"><a href="/" style="text-decoration:none;color:inherit;">GUCCI</a></div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
    </ul>
    <div class="nav-actions">
      <span class="admin-badge">Admin Panel</span>
    </div>
  </nav>

  <!-- ─── ADMIN CONTENT ─── -->
  <main class="admin-main">

    <div class="admin-header">
      <h1>Product Management</h1>
      <p>Add, edit, or remove products from the store.</p>
    </div>

    <div class="admin-layout">

      <!-- ── ADD / EDIT PRODUCT FORM ── -->
      <div class="admin-form-panel">
        <h2 id="formTitle">Add New Product</h2>

        <!-- Hidden field: stores product ID when editing -->
        <input type="hidden" id="editProductId" />

        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="productName" placeholder="e.g. Classic Linen Shirt" />
        </div>
        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number" id="productPrice" placeholder="e.g. 2999" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="productDesc" rows="3" placeholder="Short product description..."></textarea>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="productImage" placeholder="https://example.com/image.jpg" />
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" id="productStock" placeholder="e.g. 50" />
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="productCategory">
            <option value="">Select category</option>
            <option value="men">Men</option>
            <option value="women">Women</option>
            <option value="shoes">Shoes</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>

        <div class="admin-form-actions">
          <button class="btn-primary" id="saveProductBtn">Add Product</button>
          <button class="btn-secondary" id="cancelEditBtn" style="display:none;">Cancel Edit</button>
        </div>
        <p class="form-message" id="formMessage"></p>
      </div>

      <!-- ── PRODUCT LIST TABLE ── -->
      <div class="admin-table-panel">
        <div class="table-header">
          <h2>All Products</h2>
          <button class="btn-outline" id="refreshBtn">Refresh</button>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <!-- Rows injected by JS -->
            <tr><td colspan="6" style="text-align:center;padding:2rem;color:#999;">Loading products...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <!-- ─── CONFIRM DELETE MODAL ─── -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal modal-sm">
      <h2 class="modal-title">Delete Product</h2>
      <p style="margin-bottom:1.5rem;color:#555;">Are you sure you want to delete this product? This cannot be undone.</p>
      <div style="display:flex;gap:1rem;">
        <button class="btn-primary btn-danger" id="confirmDeleteBtn">Delete</button>
        <button class="btn-secondary" id="cancelDeleteBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
  <script src="/static/admin.js"></script>
</body>
</html>
